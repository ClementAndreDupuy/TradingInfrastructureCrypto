# Smart Order Router — regime weights and thresholds (live trading)

# ── Regime detection thresholds ───────────────────────────────────────────────
high_toxicity_threshold: 2.0    # avg toxicity_bps above which high-tox regime activates
low_fill_threshold: 0.45        # avg fill probability below which low-fill regime activates
high_fill_threshold: 0.75       # avg fill probability above which high-fill regime activates

# ── High toxicity regime weights ──────────────────────────────────────────────
# Prioritise fill rate, penalise adverse selection heavily
high_toxicity_fill_weight: 7.0
high_toxicity_queue_weight: 1.1
high_toxicity_tox_weight: 3.2

# ── Low fill regime weights ───────────────────────────────────────────────────
# Prioritise venues that actually fill; ease toxicity penalty
low_fill_fill_weight: 6.0
low_fill_queue_weight: 0.9
low_fill_tox_weight: 1.2

# ── High fill (normal) regime weights ─────────────────────────────────────────
high_fill_fill_weight: 3.0
high_fill_queue_weight: 0.4
high_fill_tox_weight: 0.8

# ── Score floor ───────────────────────────────────────────────────────────────
min_fill_probability: 0.05      # clip fill probability to this minimum before scoring

# ── Child Order Scheduler ─────────────────────────────────────────────────────
short_horizon_ticks: 12         # horizon below which IOC style is used
sweep_horizon_ticks: 3          # horizon below which SWEEP style is used
long_horizon_ticks: 80          # horizon above which PASSIVE style preferred
passive_join_inventory_age_bps: 0.4
passive_improve_inventory_age_bps: 0.25
aggressive_inventory_age_bps: 0.1
passive_improve_fraction: 0.20  # fraction of spread to improve for PASSIVE_IMPROVE

# ── Alpha routing constraints ─────────────────────────────────────────────────
alpha_min_signal_bps: 3.0       # minimum alpha signal to allow routing
alpha_risk_max: 0.65            # block routing if alpha risk score exceeds this
alpha_qty_scale: 0.10           # scale base quantity by (1 + alpha_qty_scale * |signal_bps|)
