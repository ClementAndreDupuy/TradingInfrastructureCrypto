strategy_mode: spot_only
reconnect_interval_secs: 1
reconciliation_interval_secs: 30
portfolio_log_heartbeat_secs: 180
venue_quality_log_heartbeat_secs: 180

default_latency_penalty_bps: 0.5
default_risk_penalty_bps: 0.2
default_fill_probability: 0.70
default_queue_ahead_qty: 0.20
default_toxicity_bps: 0.4

retry_max_attempts: 3
retry_backoff_ms: 20

binance_rest_url: https://api.binance.com
binance_ws_url: wss://stream.binance.com:9443
kraken_rest_url: https://api.kraken.com
kraken_ws_url: wss://ws.kraken.com
okx_rest_url: https://www.okx.com
okx_ws_url: wss://ws.okx.com:8443/ws/v5/public
coinbase_rest_url: https://api.coinbase.com
coinbase_ws_url: wss://advanced-trade-ws.coinbase.com

binance_futures_enabled: false
binance_futures_rest_url: https://fapi.binance.com
binance_futures_recv_window_ms: 5000
binance_futures_hedge_mode: false
binance_futures_default_leverage_cap: 5.0
