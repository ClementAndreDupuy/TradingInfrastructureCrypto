# Live trading risk limits — SOLUSDT (Binance spot)
# Tighter than shadow; kill switch is always active.

strategy:
  symbol_binance: SOLUSDT
  trade_qty_sol: 1.0            # 1 SOL per leg (~$130 at $130/SOL)
  taker_threshold_bps: 12.0     # Min spread to cross as taker
  mm_spread_target_bps: 6.0     # Min spread to post as maker
  quote_ttl_ms: 500
  tick_size: 0.01               # SOL/USDT tick size on Binance

position:
  max_per_symbol_sol: 50.0      # 50 SOL (~$6500)
  max_notional_per_symbol: 6500 # USD
  max_portfolio_notional: 13000 # USD

pnl:
  max_drawdown_usd: -250.0      # Kill at $250 drawdown
  daily_loss_limit_usd: -500.0  # Stop trading for the day above this loss

fees_bps:
  binance_maker: 2.0
  binance_taker: 5.0

rate_limits:
  max_orders_per_sec: 5         # conservative (Binance limit: 10/s)
  max_orders_per_min: 100

book:
  max_age_ms: 200               # Stale book → pause
  min_spread_bps: 5.0

heartbeat:
  timeout_ms: 3000

kill_switch:
  enabled: true
  hardware_pin: ""              # Set to GPIO pin ID if using hardware kill
  software_hotkey: "SIGTERM"


global_risk:
  max_gross_notional: 13000
  max_net_notional: 4000
  max_symbol_concentration_pct: 30.0
  max_venue_notional: 6500
  max_cross_venue_net_notional: 2500
