# Live trading risk limits — BTCUSDT perp (Binance) / PI_XBTUSD (Kraken Futures)
# Tighter than shadow; kill switch is always active.
# Load order: dev → shadow → live (each layer overrides the previous).

strategy:
  symbol_binance: BTCUSDT
  symbol_kraken: PI_XBTUSD
  trade_qty_btc: 0.001          # BTC per leg (~$65 at $65k BTC)
  taker_threshold_bps: 12.0     # Min spread to cross as taker
  mm_spread_target_bps: 6.0     # Min spread to post as maker
  quote_ttl_ms: 500
  hedge_timeout_ms: 2000

position:
  max_per_symbol_btc: 0.05      # 0.05 BTC per exchange
  max_notional_per_symbol: 3250 # USD (0.05 BTC × $65k)
  max_portfolio_notional: 6500  # USD across both exchanges

pnl:
  max_drawdown_usd: -250.0      # Kill at $250 drawdown (half of shadow)
  daily_loss_limit_usd: -500.0  # Stop trading for the day above this loss

fees_bps:
  binance_maker: 2.0
  binance_taker: 5.0
  kraken_maker: 2.0
  kraken_taker: 5.0

rate_limits:
  max_orders_per_sec: 5         # conservative (Binance limit: 10/s)
  max_orders_per_min: 100

book:
  max_age_ms: 200               # Stale book → pause (half of shadow)
  min_spread_bps: 5.0

heartbeat:
  timeout_ms: 3000              # Tighter than shadow (5000 ms)

kill_switch:
  enabled: true
  hardware_pin: ""              # Set to GPIO pin ID if using hardware kill
  software_hotkey: "SIGTERM"
