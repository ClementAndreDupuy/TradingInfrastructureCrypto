  batch_size: 32
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  n_folds: 4
  train_frac: 0.75
  pretrain_epochs: 3
  pretrain: false
  w_return: 1.0
  w_direction: 0.3
  w_risk: 0.8
  w_tc: 0.1
