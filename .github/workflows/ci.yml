name: CI

on:
  pull_request:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Python unit tests ────────────────────────────────────────────────────────
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install polars numpy scipy pytest pytest-cov requests

      - name: Run Python unit tests
        run: pytest tests/unit/test_neural_alpha.py -v --tb=short

      - name: Check coverage
        run: pytest tests/unit/test_neural_alpha.py --cov=research --cov-report=term-missing --cov-fail-under=40

  # ── Python linting ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install black ruff

      - name: black (format check)
        run: black --line-length 100 research/ deploy/ tests/unit/test_neural_alpha.py

      - name: ruff (lint)
        run: ruff check --select E,F,W,I --ignore E501,E402,F401,I001 research/ deploy/


  cpp-style-hooks:
    name: C++ style hooks (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libssl-dev \
            libwebsockets-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev \
            clang-format \
            clang-tidy
          python3 -m pip install --upgrade pip pre-commit pybind11

      - name: Run preflight dependency check
        run: python3 deploy/scripts/preflight_check.py

      - name: Configure CMake (compile_commands for clang-tidy)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_BINDINGS=ON -Dpybind11_DIR="$(python3 -m pybind11 --cmakedir)" -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS="-I$(pwd)"

      - name: Run clang-format on core/ (including bindings/)
        run: |
          pre-commit run clang-format --files $(git ls-files 'core/**/*.[ch]' 'core/**/*.cc' 'core/**/*.cpp' 'core/**/*.hpp')

      - name: Run clang-tidy on core/ (including bindings/)
        run: |
          pre-commit run clang-tidy --files $(git ls-files 'core/**/*.cc' 'core/**/*.cpp')

  # ── C++ build ────────────────────────────────────────────────────────────────
  cpp-build:
    name: C++ build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libssl-dev \
            pkg-config \
            libwebsockets-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev

      - name: Run preflight dependency check
        run: python3 deploy/scripts/preflight_check.py

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_BINDINGS=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS="-I$(pwd)"

      - name: Build
        run: cmake --build build --parallel

      - name: Run C++ unit/integration/replay tests
        run: cd build && ctest --output-on-failure --exclude-regex "BinanceFeedTest|KrakenFeedTest|CoinbaseFeedTest|OkxFeedTest"

      - name: Run latency budget perf gates
        run: cd build && ctest --output-on-failure -L perf


  cpp-sanitizers:
    name: C++ sanitizer matrix (${{ matrix.sanitizer.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: asan-ubsan
            flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
          - name: tsan
            flags: "-fsanitize=thread -fno-omit-frame-pointer"
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev pkg-config libwebsockets-dev libcurl4-openssl-dev nlohmann-json3-dev

      - name: Run preflight dependency check
        run: python3 deploy/scripts/preflight_check.py

      - name: Configure CMake with sanitizer
        run: cmake -S . -B build-sanitizer -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTS=ON -DBUILD_BINDINGS=OFF -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer.flags }} -I$(pwd)" -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer.flags }}" -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.sanitizer.flags }}"

      - name: Build
        run: cmake --build build-sanitizer --parallel

      - name: Run deterministic connector failure-injection suite
        run: cd build-sanitizer && ctest --output-on-failure -R ConnectorFailureInjectionTest

      - name: Run execution/risk deterministic suites
        run: cd build-sanitizer && ctest --output-on-failure -R "ConnectorContractTest|LiveConnectorsTest|IdempotencyRecoveryTest|ReconciliationServiceTest|MarketMakerRiskTest|GlobalRiskControlsTest"
