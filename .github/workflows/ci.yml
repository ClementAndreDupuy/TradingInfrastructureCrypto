name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Python unit tests ────────────────────────────────────────────────────────
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install polars numpy scipy pytest pytest-cov requests

      - name: Run Python unit tests
        run: pytest tests/unit/test_neural_alpha.py -v --tb=short

      - name: Check coverage
        run: pytest tests/unit/test_neural_alpha.py --cov=research --cov-report=term-missing --cov-fail-under=40

  # ── Python linting ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install black ruff

      - name: black (format check)
        run: black --line-length 100 research/ deploy/ tests/unit/test_neural_alpha.py

      - name: ruff (lint)
        run: ruff check --select E,F,W,I --ignore E501,E402,F401,I001 research/ deploy/

  # ── C++ build ────────────────────────────────────────────────────────────────
  cpp-build:
    name: C++ build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libssl-dev \
            pkg-config \
            libwebsockets-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_BINDINGS=OFF -DCMAKE_CXX_FLAGS="-I$(pwd)"

      - name: Build
        run: cmake --build build --parallel

      - name: Run C++ unit/integration/replay tests
        run: cd build && ctest --output-on-failure --exclude-regex "BinanceFeedTest|KrakenFeedTest|CoinbaseFeedTest|OkxFeedTest"
