groups:
  - name: trading-slo-alerts
    rules:
      - alert: TradingFeedIntegrityFastBurn
        expr: trading_sli_feed_integrity_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: trading
        annotations:
          summary: "Trading feed integrity fast burn"
      - alert: TradingFeedIntegritySlowBurn
        expr: trading_sli_feed_integrity_burn_rate > 2
        for: 1h
        labels:
          severity: warning
          team: trading
        annotations:
          summary: "Trading feed integrity slow burn"
      - alert: TradingRejectSpikeFastBurn
        expr: trading_sli_reject_health_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: trading
        annotations:
          summary: "Trading reject spike fast burn"
      - alert: TradingReconciliationDriftFastBurn
        expr: trading_sli_reconciliation_health_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: trading
        annotations:
          summary: "Reconciliation drift fast burn"
      - alert: TradingRiskTriggerFastBurn
        expr: trading_sli_risk_health_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: risk
        annotations:
          summary: "Risk trigger frequency fast burn"

