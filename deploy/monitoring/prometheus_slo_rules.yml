          team: data
        annotations:
          summary: "DB ingest freshness slow burn"
      - alert: DBWriteAvailabilityFastBurn
        expr: db_sli_write_availability_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "DB write availability fast burn"
      - alert: DBCompletenessFastBurn
        expr: db_sli_completeness_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "DB completeness fast burn"
      - alert: DBCorrectnessFastBurn
        expr: db_sli_correctness_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "DB correctness fast burn"
      - alert: DBDurabilityFastBurn
        expr: db_sli_durability_burn_rate > 14
        for: 10m
        labels:
          severity: critical
          team: data
        annotations:
